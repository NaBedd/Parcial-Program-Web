<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDash-Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <section id="login-view" class="view view--active">
    <form id="login-form" class="login-card" novalidate>
      <h1 class="login-card__title">SkyDash<span>Manager</span></h1>
      <p class="login-card__subtitle">Plataforma analítica meteorológica</p>
      <label class="field">
        <span class="field__label">Usuario</span>
        <input type="text" id="login-user" class="field__input" required autocomplete="username" value="demo" />
      </label>
      <label class="field">
        <span class="field__label">Contraseña</span>
        <input type="password" id="login-pass" class="field__input" required autocomplete="current-password" value="demo" />
      </label>
      <button type="submit" class="btn btn--primary" id="login-btn">
        <span class="btn__label">Ingresar</span>
        <span class="spinner spinner--hidden" id="login-spinner" aria-hidden="true"></span>
      </button>
      <p class="login-card__hint">Cualquier credencial es válida (demo).</p>
    </form>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboard-view" class="view">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo">⛅</span>
        <h1 class="topbar__title">SkyDash<span>Manager</span></h1>
      </div>
      <form id="search-form" class="search">
        <input type="text" id="search-input" class="search__input" placeholder="Buscar ciudad..." autocomplete="off" />
        <button type="submit" class="btn btn--ghost">Buscar</button>
      </form>
      <div class="topbar__actions">
        <button id="theme-toggle" class="btn btn--icon" title="Cambiar tema">🌓</button>
        <button id="logout-btn" class="btn btn--danger">Salir</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel panel--left">
        <section class="card">
          <header class="card__header">
            <h2 class="card__title">Clima Actual</h2>
            <span id="current-location" class="card__badge">—</span>
          </header>
          <div class="current" id="current-weather">
            <div class="current__icon" id="current-icon">☁️</div>
            <div class="current__temp" id="current-temp">--°</div>
            <ul class="current__meta">
              <li><span>Humedad</span><strong id="current-humidity">--%</strong></li>
              <li><span>Viento</span><strong id="current-wind">-- km/h</strong></li>
              <li><span>Sensación</span><strong id="current-feels">--°</strong></li>
            </ul>
          </div>
          <button id="save-fav-btn" class="btn btn--primary btn--block" disabled>★ Guardar ubicación</button>
        </section>

        <section class="card">
          <header class="card__header">
            <h2 class="card__title">Mis Ubicaciones</h2>
          </header>
          <ul id="fav-list" class="fav-list"></ul>
          <p id="fav-empty" class="fav-empty">Sin favoritos aún.</p>
        </section>
      </aside>

      <section class="panel panel--map">
        <div id="map" class="map"></div>
        <div id="net-status" class="net-status net-status--hidden">Modo offline</div>
      </section>

      <aside class="panel panel--right">
        <section class="card">
          <header class="card__header">
            <h2 class="card__title">Pronóstico 7 días</h2>
          </header>
          <ul id="forecast-list" class="forecast"></ul>
        </section>
      </aside>
    </main>

    <div id="loading-overlay" class="overlay overlay--hidden">
      <div class="spinner spinner--lg"></div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="script.js"></script>
</body>
</html>
